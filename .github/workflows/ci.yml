name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r backend/requirements-dev.txt
      - run: make lint

  test:
    name: Tests & eval (integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Runs offline (no OPENAI_API_KEY): lexical retrieval + extractive answers,
      # so the suite is deterministic and needs no secrets.
      - name: Prepare env
        run: cp .env.example .env
      - name: Create shared reverse-proxy network (declared external in compose)
        run: docker network create web || true
      - name: Start the stack (postgres, neo4j, qdrant, backend, nginx)
        run: docker compose up -d --build
      - name: Wait for backend health
        run: bash scripts/wait_for_services.sh localhost 8080 180
      - name: Seed the three stores
        run: make seed
      - name: Run backend + ingestion test suites
        run: make test
      - name: Replay golden questions and gate on thresholds
        run: make eval
      - name: Dump backend logs on failure
        if: failure()
        run: docker compose logs backend
